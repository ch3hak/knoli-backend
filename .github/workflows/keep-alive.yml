name: Keep KNOLI Backend Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
    - name: Keep KNOLI warm
      run: |
        curl -f -s https://knoli-backend.onrender.com/ping
        curl -f -s https://knoli-backend.onrender.com/api/deck/getAll || true